<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNest | Verify Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/email-verfication.css}">
    <script th:src="@{/email-verification.js}" defer></script>

</head>
<body>

    <!-- Floating background icons -->
    <div class="bg-icons">
        <span class="bg-icon" style="--x:8%;--y:12%;--d:0s">🛍</span>
        <span class="bg-icon" style="--x:88%;--y:18%;--d:1.5s">📦</span>
        <span class="bg-icon" style="--x:6%;--y:78%;--d:3s">🛒</span>
        <span class="bg-icon" style="--x:90%;--y:75%;--d:2s">🏷</span>
        <span class="bg-icon" style="--x:50%;--y:90%;--d:1s">💳</span>
    </div>

    <main class="page-center">
        <div class="card">

            <!-- Brand -->
            <div class="brand">
                <span class="brand-icon">🛒</span>
                <span class="brand-name">ShopNest</span>
            </div>

            <!-- Lock illustration -->
            <div class="lock-wrap">
                <div class="lock-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="lock-svg">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
            </div>

            <h1 class="card-title">Forgot Password?</h1>
            <p class="card-subtitle">
                No worries! Enter the email address linked to your ShopNest account
                and we'll send you a verification OTP.
            </p>

            <!-- Server error alert -->
            <div class="alert alert-error" th:if="${error}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span th:text="${error}"></span>
            </div>

            <!-- JS error alert -->
            <div class="alert alert-error" id="jsAlert" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="jsAlertMsg"></span>
            </div>

            <form id="verifyForm"
                  th:action="@{/user/verification/email-verification}"
                  method="post"
                  novalidate>

                <div class="field-group" id="emailGroup">
                    <label class="field-label" for="email">Email Address</label>
                    <div class="field-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="field-input"
                            placeholder="you@example.com"
                            autocomplete="email"
                            aria-describedby="emailError"
                            aria-required="true"
                        >
                        <span class="field-status" aria-hidden="true"></span>
                    </div>
                    <p class="field-error" id="emailError" role="alert"></p>
                </div>

                <button type="submit" class="verify-btn" id="verifyBtn">
                    <span class="btn-text">Verify</span>
                    <span class="btn-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </span>
                    <span class="btn-loader"></span>
                </button>

            </form>

            <div class="back-link">
                <a th:href="@{/api/users/login}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Login
                </a>
            </div>

        </div>
    </main>

    <script th:src="@{/email_verification.js}"></script>
</body>
</html>
