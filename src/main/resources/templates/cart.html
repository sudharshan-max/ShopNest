<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart — ShopNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cart.css}">
    <link rel="stylesheet" href="/toast.css">
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav class="navbar" id="navbar">
    <div class="nav-container">

        <a href="/api/products/home" class="nav-brand">
            <div class="brand-icon">🛒</div>
            <span class="brand-name">ShopNest</span>
        </a>

        <div class="nav-center">
            <a href="/api/products/home" class="nav-back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 5l-7 7 7 7"/>
                </svg>
                Continue Shopping
            </a>
        </div>

        <div class="nav-right">
            <div class="nav-user" id="navUser">
                <div class="user-avatar"
                     th:text="${username != null ? #strings.substring(username,0,1).toUpperCase() : 'U'}">U</div>
                <span class="user-name"
                      th:text="${username != null ? username : 'User'}">User</span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m6 9 6 6 6-6"/>
                </svg>
                <div class="user-dropdown">
                    <a href="/api/products/home">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        </svg>
                        Home
                    </a>
                    <a href="/api/users/profile">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        My Profile
                    </a>
                    <a href="/api/orders">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                        </svg>
                        My Orders
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="/api/auth/logout" class="logout-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Sign Out
                    </a>
                </div>
            </div>

            <div class="cart-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
        <a href="/api/products/home">Home</a>
        <a href="/api/users/profile">My Profile</a>
        <a href="/api/orders">My Orders</a>
        <a href="/api/auth/logout" class="logout-link">Sign Out</a>
    </div>
</nav>

<!-- ═══════════════ CART PAGE ═══════════════ -->
<main class="cart-main">
    <div class="cart-container">

        <!-- Page title -->
        <div class="cart-page-header">
            <div>
                <span class="section-label">My Cart</span>
                <h1 class="cart-page-title">Shopping Cart</h1>
            </div>
            <span class="cart-items-count" id="cartItemsCount"></span>
        </div>

        <!-- Main layout: items + summary -->
        <div class="cart-layout" id="cartLayout">

            <!-- LEFT — Cart items -->
            <div class="cart-items-col" id="cartItemsCol">
                <!-- JS renders here -->
                <div class="cart-loading" id="cartLoading">
                    <div class="skeleton-row" th:each="i : ${#numbers.sequence(1,3)}">
                        <div class="skel-img"></div>
                        <div class="skel-info">
                            <div class="skel-line w60"></div>
                            <div class="skel-line w40"></div>
                            <div class="skel-line w30"></div>
                        </div>
                        <div class="skel-price"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT — Order summary -->
            <div class="cart-summary-col" id="cartSummaryCol">
                <div class="summary-card" id="summaryCard">
                    <h3 class="summary-title">Order Summary</h3>

                    <div class="summary-rows" id="summaryRows">
                        <div class="summary-skeleton">
                            <div class="skel-line w80"></div>
                            <div class="skel-line w60"></div>
                            <div class="skel-line w70"></div>
                        </div>
                    </div>

                    <div class="summary-divider"></div>

                    <div class="summary-total-row">
                        <span>Grand Total</span>
                        <span class="summary-grand-total" id="grandTotal">₹0</span>
                    </div>

                    <div class="summary-delivery-note">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
                            <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                        </svg>
                        Free delivery on orders above ₹499
                    </div>

                    <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">
                        Proceed to Payment
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>

                    <a href="/api/products/home" class="continue-shopping-link">
                        ← Continue Shopping
                    </a>
                </div>
            </div>

        </div>

    </div>
</main>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer class="footer">
    <div class="footer-bottom">© 2026 ShopNest. All rights reserved.</div>
</footer>

<!-- Hidden user data for JS -->
<div id="userData"
     th:data-username="${username}"
     style="display:none">
</div>

<div id="toastData"
     th:data-success="${success}"
     th:data-error="${error}"
     style="display:none">
</div>

<script src="/cart.js"></script>
<script src="/toast.js"></script>
</body>
</html>
