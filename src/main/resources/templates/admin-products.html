<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — ShopNest Admin</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <a href="/api/admin/dashboard" class="sb-brand">
            <span class="sb-logo">🛒</span>
            <div><span class="sb-name">ShopNest</span><span class="sb-tag">Admin</span></div>
        </a>
        <nav class="sb-nav">
            <span class="sb-label">Overview</span>
            <a href="/api/admin/dashboard" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>Dashboard
            </a>
            <span class="sb-label">Manage</span>
            <a href="/api/admin/products" class="sb-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>Products
            </a>
            <a href="/api/admin/users" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>Users
            </a>
            <span class="sb-label">Insights</span>
            <a href="/api/admin/analytics" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6"  y1="20" x2="6"  y2="14"/>
                </svg>Analytics
            </a>
        </nav>
        <div class="sb-footer">
            <div class="sb-user">
                <a href="/api/users/profile"><div class="sb-avatar" th:text="${username != null ? #strings.substring(username,0,1).toUpperCase() : 'A'}">A</div></a>
                <div><div class="sb-uname" th:text="${username}">Admin</div><div class="sb-urole">Admin</div></div>
            </div>
            <a href="/api/auth/logout" class="sb-logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>Sign Out
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:.75rem">
                <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6"  x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">Manage Products</span>
            </div>
            <span class="admin-badge">⚡ Admin</span>
        </div>

        <div class="content">
            <div class="two-col">

                <!-- ADD PRODUCT -->
                <div class="card">
                    <div class="sec-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>Add New Product
                    </div>

                    <div id="addAlert" class="alert"></div>

                    <div class="form-group">
                        <label class="form-label">Product Name *</label>
                        <input type="text" id="pName" class="form-input" placeholder="e.g. Classic White Shirt">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description *</label>
                        <textarea id="pDesc" class="form-textarea" placeholder="Product description…"></textarea>
                    </div>
                    <div class="g2">
                        <div class="form-group">
                            <label class="form-label">Price (₹) *</label>
                            <input type="number" id="pPrice" class="form-input" placeholder="0.00" min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stock *</label>
                            <input type="number" id="pStock" class="form-input" placeholder="0" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category ID *</label>
                        <input type="number" id="pCatId" class="form-input" placeholder="Enter category ID">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Image URL *</label>
                        <input type="url" id="pImgUrl" class="form-input" placeholder="https://…">
                    </div>

                    <!-- Preview -->
                    <div class="img-preview" id="imgPreview">
                        <img id="imgPreviewImg" src="" alt="Preview">
                    </div>

                    <button class="btn btn-primary" id="addBtn" onclick="addProduct()" style="width:100%">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>Add Product
                    </button>
                </div>

                <!-- RIGHT: DELETE + LIST -->
                <div>
                    <!-- Delete -->
                    <div class="card" style="margin-bottom:1.25rem">
                        <div class="sec-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                            </svg>Delete Product
                        </div>
                        <div id="delAlert" class="alert"></div>
                        <div class="del-row">
                            <input type="number" id="delId" class="form-input" placeholder="Product ID to delete">
                            <button class="btn btn-danger" onclick="confirmDelete()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>Delete
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-bg" id="delModal">
    <div class="modal">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
        </div>
        <h3>Delete Product?</h3>
        <p id="delModalMsg">This action cannot be undone.</p>
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-danger" id="delConfirmBtn" onclick="executeDelete()">Delete</button>
        </div>
    </div>
</div>

<script src="/admin-products.js"></script>
</body>
</html>
