<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — ShopNest Admin</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <a href="/api/admin/dashboard" class="sb-brand">
            <span class="sb-logo">🛒</span>
            <div><span class="sb-name">ShopNest</span><span class="sb-tag">Admin</span></div>
        </a>
        <nav class="sb-nav">
            <span class="sb-label">Overview</span>
            <a href="/api/admin/dashboard" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>Dashboard
            </a>
            <span class="sb-label">Manage</span>
            <a href="/api/admin/products" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                </svg>Products
            </a>
            <a href="/api/admin/users" class="sb-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>Users
            </a>
            <span class="sb-label">Insights</span>
            <a href="/api/admin/analytics" class="sb-link active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6"  y1="20" x2="6"  y2="14"/>
                </svg>Analytics
            </a>
        </nav>
        <div class="sb-footer">
            <div class="sb-user">
                <a href="/api/users/profile"><div class="sb-avatar" th:text="${username != null ? #strings.substring(username,0,1).toUpperCase() : 'A'}">A</div></a>
                <div><div class="sb-uname" th:text="${username}">Admin</div><div class="sb-urole">Admin</div></div>
            </div>
            <a href="/api/auth/logout" class="sb-logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>Sign Out
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:.75rem">
                <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6"  x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">Business Analytics</span>
            </div>
            <span class="admin-badge">⚡ Admin</span>
        </div>

        <div class="content">

            <!-- Overall strip — auto loads -->
            <div class="overall-bar">
                <div id="overallContent" class="loading-row"><div class="spin"></div>Loading overall metrics…</div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('daily',this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>Daily
                </button>
                <button class="tab-btn" onclick="switchTab('monthly',this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>Monthly
                </button>
                <button class="tab-btn" onclick="switchTab('yearly',this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6"  y1="20" x2="6"  y2="14"/>
                    </svg>Yearly
                </button>
            </div>

            <!-- DAILY -->
            <div class="tab-panel active" id="panel-daily">
                <div class="card">
                    <div class="analytics-form">
                        <div class="form-group">
                            <label class="form-label">Date</label>
                            <input type="date" id="dailyDate" class="form-input" style="max-width:200px">
                        </div>
                        <button class="btn btn-primary" onclick="fetchDaily()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            </svg>Get Report
                        </button>
                    </div>
                    <div id="dailyResult" style="display:none" class="result-box"></div>
                </div>
            </div>

            <!-- MONTHLY -->
            <div class="tab-panel" id="panel-monthly">
                <div class="card">
                    <div class="analytics-form">
                        <div class="form-group">
                            <label class="form-label">Month</label>
                            <select id="monthSel" class="form-select" style="max-width:160px">
                                <option value="1">January</option><option value="2">February</option>
                                <option value="3">March</option><option value="4">April</option>
                                <option value="5">May</option><option value="6">June</option>
                                <option value="7">July</option><option value="8">August</option>
                                <option value="9">September</option><option value="10">October</option>
                                <option value="11">November</option><option value="12">December</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Year</label>
                            <input type="number" id="monthYear" class="form-input" style="max-width:110px" placeholder="2026">
                        </div>
                        <button class="btn btn-primary" onclick="fetchMonthly()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            </svg>Get Report
                        </button>
                    </div>
                    <div id="monthlyResult" style="display:none" class="result-box"></div>
                </div>
            </div>

            <!-- YEARLY -->
            <div class="tab-panel" id="panel-yearly">
                <div class="card">
                    <div class="analytics-form">
                        <div class="form-group">
                            <label class="form-label">Year</label>
                            <input type="number" id="yearSel" class="form-input" style="max-width:140px" placeholder="2026">
                        </div>
                        <button class="btn btn-primary" onclick="fetchYearly()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            </svg>Get Report
                        </button>
                    </div>
                    <div id="yearlyResult" style="display:none" class="result-box"></div>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="/admin-analytics.js"></script>
</body>
</html>
