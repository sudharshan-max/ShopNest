<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNest | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/reset-password.css}">
    <script th:src="@{/reset-password.js}" defer></script>
    <link rel="stylesheet" th:href="@{/toast.css}">
</head>
<body>

    <!-- Floating background icons -->
    <div class="bg-layer">
        <span class="bg-icon" style="--x:8%;--y:12%;--d:0s">🛍</span>
        <span class="bg-icon" style="--x:88%;--y:18%;--d:1.5s">📦</span>
        <span class="bg-icon" style="--x:6%;--y:78%;--d:3s">🛒</span>
        <span class="bg-icon" style="--x:90%;--y:75%;--d:2s">🏷</span>
        <span class="bg-icon" style="--x:50%;--y:90%;--d:1s">💳</span>
    </div>

    <main class="page-center">
        <div class="card">

            <!-- Brand -->
            <div class="brand">
                <span class="brand-icon">🛒</span>
                <span class="brand-name">ShopNest</span>
            </div>

            <!-- Key illustration -->
            <div class="key-wrap">
                <div class="key-ring ring-3"></div>
                <div class="key-ring ring-2"></div>
                <div class="key-ring ring-1"></div>
                <div class="key-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" class="key-svg">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                </div>
            </div>

            <!-- Header -->
            <h1 class="card-title">Create New Password</h1>
            <p class="card-subtitle">
                Almost there! Set a strong new password<br>
                <span class="subtitle-note">for your ShopNest account.</span>
            </p>

            <!-- Server error alert -->
            <div class="alert alert-error" th:if="${error}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span th:text="${error}"></span>
            </div>

            <!-- JS error alert -->
            <div class="alert alert-error" id="jsAlert">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="jsAlertMsg"></span>
            </div>

            <form id="resetForm"
                  th:action="@{/user/verification/reset-password}"
                  method="post"
                  novalidate>

                <!-- New Password -->
                <div class="field-group" id="passwordGroup">
                    <label class="field-label" for="newPassword">New Password</label>
                    <div class="field-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input
                            type="password"
                            id="newPassword"
                            name="newPassword"
                            class="field-input"
                            placeholder="Create a strong password"
                            autocomplete="new-password"
                            aria-describedby="passwordError"
                            aria-required="true"
                        >
                        <button type="button" class="eye-btn" id="eyeBtn1" aria-label="Toggle password visibility">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>

                    <!-- Strength meter -->
                    <div class="strength-wrap">
                        <div class="strength-segments">
                            <div class="seg" id="seg1"></div>
                            <div class="seg" id="seg2"></div>
                            <div class="seg" id="seg3"></div>
                            <div class="seg" id="seg4"></div>
                        </div>
                        <span class="strength-label" id="strengthLabel"></span>
                    </div>

                    <!-- Requirements checklist -->
                    <ul class="req-list" id="reqList">
                        <li class="req-item" id="req-length">
                            <span class="req-dot"></span>At least 8 characters
                        </li>
                        <li class="req-item" id="req-upper">
                            <span class="req-dot"></span>One uppercase letter
                        </li>
                        <li class="req-item" id="req-lower">
                            <span class="req-dot"></span>One lowercase letter
                        </li>
                        <li class="req-item" id="req-number">
                            <span class="req-dot"></span>One number
                        </li>
                        <li class="req-item" id="req-special">
                            <span class="req-dot"></span>One special character (@#$%^&+=!)
                        </li>
                    </ul>

                    <p class="field-error" id="passwordError"></p>
                </div>

                <!-- Confirm Password -->
                <div class="field-group" id="confirmGroup">
                    <label class="field-label" for="confirmPassword">Confirm New Password</label>
                    <div class="field-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <input
                            type="password"
                            id="confirmPassword"
                            class="field-input"
                            placeholder="Repeat your new password"
                            autocomplete="new-password"
                            aria-describedby="confirmError"
                            aria-required="true"
                        >
                        <button type="button" class="eye-btn" id="eyeBtn2" aria-label="Toggle confirm password visibility">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                        <span class="match-badge" id="matchBadge"></span>
                    </div>
                    <p class="field-error" id="confirmError"></p>
                </div>

                <!-- Submit -->
                <button type="submit" class="reset-btn" id="resetBtn">
                    <span class="btn-text">Reset Password</span>
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </span>
                    <span class="btn-loader"></span>
                </button>

            </form>

            <!-- Back link -->
            <div class="back-link">
                <a th:href="@{/api/users/login}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Login
                </a>
            </div>

        </div>
    </main>
    <div id="toastData"
	     th:data-success="${success}"
	     th:data-error="${error}"
	     style="display:none">
	</div>
	<script th:src="@{/toast.js}"></script>

</body>
</html>
